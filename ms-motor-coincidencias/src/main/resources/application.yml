server:
  port: 8084

spring:
  application:
    name: ms-motor-coincidencias
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_coincidencias}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# CONFIGURACIÓN DE SWAGGER / OPENAPI
springdoc:
  show-actuator: true 
  swagger-ui:
    use-root-path: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api/coincidencias/v3/api-docs
