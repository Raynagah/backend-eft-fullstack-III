server:
  port: 8081

spring:
  application:
    name: ms-gestion-mascotas

  # CONEXIÓN PARAMETRIZADA A LA BASE DE DATOS DOCKER/AWS
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_mascotas}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}

  # CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  # CONFIGURACIÓN DE CACHÉ Y REDIS
  cache:
    type: redis
    redis:
      time-to-live: 15m
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

# CONFIGURACIÓN DE EUREKA CLIENT
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    
# CONFIGURACIÓN DE SWAGGER / OPENAPI
springdoc:
  show-actuator: true
  swagger-ui:
    use-root-path: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api/mascotas/v3/api-docs