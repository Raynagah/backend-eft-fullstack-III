server:
  port: 8081

spring:
  application:
    name: ms-gestion-mascotas

  # CONEXIÓN A LA BASE DE DATOS NEON
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_mascotas}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}

  # CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# CONFIGURACIÓN DE EUREKA CLIENT
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# CONFIGURACIÓN DE SWAGGER / OPENAPI
springdoc:
  show-actuator: true 
  swagger-ui:
    use-root-path: true
    path: /swagger-ui.html
    operations-sorter: alpha # Ordena los endpoints alfabéticamente
    tags-sorter: alpha
  api-docs:
    path: /api/mascotas/v3/api-docs
  