version: '3.8'

services:
  # 0. BASE DE DATOS LOCAL
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - pg_data_local:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 1. EUREKA
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      - postgres-db

  # 2. MICROSERVICIO DE MASCOTAS
  ms-gestion-mascotas:
    build: ./gestion-mascotas
    container_name: ms-gestion-mascotas
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_mascotas
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # 3. API GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      eureka-server:
        condition: service_healthy

  # 4. MICROSERVICIO DE GEOLOCALIZACIÓN
  ms-geolocalizacion:
    build: ./ms-geolocalizacion
    container_name: ms-geolocalizacion
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_geolocalizacion
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # 5. MOTOR DE COINCIDENCIAS
  ms-motor-coincidencias:
    build: ./ms-motor-coincidencias
    container_name: ms-motor-coincidencias
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_coincidencias
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # 6. MICROSERVICIO DE USUARIOS
  ms-usuarios:
    build: ./usuarios
    container_name: ms-usuarios
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_usuarios
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
      - JWT_SECRET=MiClaveSuperSecretaParaMascotas123456789!
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # 6.1 MICROSERVICIO DE NOTIFICACIONES
  ms-notificaciones:
    build: ./notificaciones
    container_name: ms-notificaciones
    ports:
      - "8086:8086"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_notificaciones
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

 # 7. BFF
  ms-bff:
    build: ./bff
    container_name: ms-bff
    ports:
      - "8087:8087"
    environment:
      - SPRING_APPLICATION_NAME=ms-bff
      - SERVER_PORT=8087
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SERVICES_MASCOTAS_URL=http://ms-gestion-mascotas:8081
      - SERVICES_GEOLOCALIZACION_URL=http://ms-geolocalizacion:8083
      - SERVICES_COINCIDENCIAS_URL=http://ms-motor-coincidencias:8084
      - SERVICES_USUARIOS_URL=http://ms-usuarios:8085
      - SERVICES_NOTIFICACIONES_URL=http://ms-notificaciones:8086
    depends_on:
      - eureka-server
      - ms-gestion-mascotas
      - ms-geolocalizacion
      - ms-usuarios
      - ms-motor-coincidencias

# ========================================================
  # SECCIÓN DE PRUEBAS Y REPORTES (JACOCO) - SOLO CON TEST
  # ========================================================

  ms-usuarios-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-usuarios-test
    profiles:
      - test-suite
    volumes:
      - ./usuarios:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_usuarios
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JWT_SECRET=MiClaveSuperSecretaParaMascotas123456789!
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-gestion-mascotas-test:
    image: maven:3.8.5-openjdk-17-slim
