version: '3.8'

services:
  # 0. Base de Datos LOCAL
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - pg_data_local:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 1. EUREKA
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres-db

  # 2. API GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xms128m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      eureka-server:
        condition: service_healthy

  # Redis Caché
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

   # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Puerto interno de comunicación AMQP
      - "15672:15672" # Puerto del panel de administración web
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # 3. Microservicio de Usuarios
  ms-usuarios:
    build: ./usuarios
    container_name: ms-usuarios
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_usuarios
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
      - JWT_SECRET=MiClaveSuperSecretaParaMascotas123456789!
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      rabbitmq:
        condition: service_healthy

  # 4. Microservicio de Mascotas
  ms-gestion-mascotas:
    build: ./gestion-mascotas
    container_name: ms-gestion-mascotas
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_mascotas
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ms-usuarios:
        condition: service_healthy

  # 5. Microservicio de Geolocalización
  ms-geolocalizacion:
    build: ./ms-geolocalizacion
    container_name: ms-geolocalizacion
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_geolocalizacion
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ms-gestion-mascotas:
        condition: service_healthy

  # 6. Motor de Coincidencias
  ms-motor-coincidencias:
    build: ./ms-motor-coincidencias
    container_name: ms-motor-coincidencias
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_coincidencias
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ms-geolocalizacion:
        condition: service_healthy

  # 7 Microservicio de Notificaciones
  ms-notificaciones:
    build: ./notificaciones
    container_name: ms-notificaciones
    ports:
      - "8086:8086"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_notificaciones
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ms-motor-coincidencias:
        condition: service_healthy

  # 8. BFF
  ms-bff:
    build: ./bff
    container_name: ms-bff
    ports:
      - "8087:8087"
    environment:
      - SPRING_APPLICATION_NAME=ms-bff
      - SERVER_PORT=8087
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SERVICES_MASCOTAS_URL=http://ms-gestion-mascotas:8081
      - SERVICES_GEOLOCALIZACION_URL=http://ms-geolocalizacion:8083
      - SERVICES_COINCIDENCIAS_URL=http://ms-motor-coincidencias:8084
      - SERVICES_USUARIOS_URL=http://ms-usuarios:8085
      - SERVICES_NOTIFICACIONES_URL=http://ms-notificaciones:8086
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8087/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ms-notificaciones:
        condition: service_healthy


  # Sección de Pruebas y Reportes (JACOCO - TEST)

  ms-usuarios-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-usuarios-test
    profiles:
      - test-suite
    volumes:
      - ./usuarios:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_usuarios
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - JWT_SECRET=MiClaveSuperSecretaParaMascotas123456789!
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      ms-bff:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-gestion-mascotas-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-gestion-mascotas-test
    profiles:
      - test-suite
    volumes:
      - ./gestion-mascotas:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_mascotas
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      ms-usuarios-test:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-motor-coincidencias-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-motor-coincidencias-test
    profiles:
      - test-suite
    volumes:
      - ./ms-motor-coincidencias:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_coincidencias
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
    depends_on:
      ms-gestion-mascotas-test:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-geolocalizacion-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-geolocalizacion-test
    profiles:
      - test-suite
    volumes:
      - ./ms-geolocalizacion:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_geolocalizacion
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
    depends_on:
      ms-motor-coincidencias-test:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-notificaciones-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-notificaciones-test
    profiles:
      - test-suite
    volumes:
      - ./notificaciones:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:postgresql://postgres-db:5432/db_notificaciones
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
    depends_on:
      ms-geolocalizacion-test:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M

  ms-bff-test:
    image: maven:3.8.5-openjdk-17-slim
    container_name: ms-bff-test
    profiles:
      - test-suite
    volumes:
      - ./bff:/app
      - maven_cache:/root/.m2
    working_dir: /app
    command: mvn clean test
    environment:
      - SPRING_APPLICATION_NAME=ms-bff
      - SERVER_PORT=8087
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SERVICES_MASCOTAS_URL=http://ms-gestion-mascotas:8081
      - SERVICES_GEOLOCALIZACION_URL=http://ms-geolocalizacion:8083
      - SERVICES_COINCIDENCIAS_URL=http://ms-motor-coincidencias:8084
      - SERVICES_USUARIOS_URL=http://ms-usuarios:8085
      - SERVICES_NOTIFICACIONES_URL=http://ms-notificaciones:8086
    depends_on:
      ms-notificaciones-test:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
  
  generar-dashboard:
    image: node:20-alpine
    container_name: generador_cobertura
    volumes:
      - ./:/app
    working_dir: /app
    command: node generar-dashboard.js
    profiles: ["test-suite"]
    depends_on:
      ms-usuarios-test:
        condition: service_completed_successfully
      ms-gestion-mascotas-test:
        condition: service_completed_successfully
      ms-motor-coincidencias-test:
        condition: service_completed_successfully
      ms-geolocalizacion-test:
        condition: service_completed_successfully
      ms-notificaciones-test:
        condition: service_completed_successfully
      ms-bff-test:
        condition: service_completed_successfully

volumes:
  pg_data_local:
  maven_cache: