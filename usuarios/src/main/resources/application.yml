server:
  port: 8085

spring:
  application:
    name: ms-usuarios

  # CONEXIÓN PARAMETRIZADA A LA BASE DE DATOS DOCKER/AWS
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_usuarios}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}

  # CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# CONFIGURACIÓN DE EUREKA CLIENT
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  show-actuator: true
  swagger-ui:
    use-root-path: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api/usuarios/v3/api-docs